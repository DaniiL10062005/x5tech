build:
  maxIssues: 0

config:
  validation: true

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
    excludeRawStrings: true
  WildcardImport:
    active: true

complexity:
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    active: false

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
    ignoreAnnotated:
      - Composable
  MatchingDeclarationName:
    active: true
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

exceptions:
  SwallowedException:
    active: true
  TooGenericExceptionCaught:
    active: false

formatting:
  active: true
  autoCorrect: true
  Indentation:
    active: true
    indentSize: 4
  FinalNewline:
    active: true
  MaximumLineLength:
    active: true
    maxLineLength: 120
  NoWildcardImports:
    active: true
  TrailingCommaOnCallSite:
    active: true
    useTrailingCommaOnCallSite: true
  TrailingCommaOnDeclarationSite:
    active: true
    useTrailingCommaOnDeclarationSite: true
  TrailingWhitespace:
    active: true
